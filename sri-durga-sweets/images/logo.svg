<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <!-- Fonts Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,900&amp;family=DM+Sans:wght@500;700;800&amp;display=swap');
      
      .brand-title {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        fill: url(#gold-gradient);
        filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.4));
      }
      
      .brand-subtitle {
        font-family: 'DM Sans', sans-serif;
        font-weight: 800;
        fill: #FFFFFF;
        letter-spacing: 3px;
        font-size: 11px;
        filter: drop-shadow(0px 1px 2px rgba(0, 0, 0, 0.3));
      }
      
      .badge-text {
        font-family: 'DM Sans', sans-serif;
        font-weight: 700;
        fill: #B54D05;
        font-size: 8px;
        letter-spacing: 1.5px;
      }
      
      .monogram-text {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-weight: 900;
        fill: url(#red-gradient);
        font-size: 38px;
      }
      
      .shadow {
        filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.15));
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="red-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8640A" /> <!-- Saffron/Red-Orange blend -->
      <stop offset="50%" stop-color="#DC2626" /> <!-- Pure Red -->
      <stop offset="100%" stop-color="#991B1B" /> <!-- Deep Red -->
    </linearGradient>

    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF5" /> <!-- Cream shine -->
      <stop offset="30%" stop-color="#FBBF24" /> <!-- Golden yellow -->
      <stop offset="100%" stop-color="#D97706" /> <!-- Amber/Bronze base -->
    </linearGradient>

    <linearGradient id="blue-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>

    <linearGradient id="gold-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Group with Shadow Filter -->
  <g filter="url(#drop-shadow)">
    <!-- 1. DIAMOND BADGE (Background & Monogram) -->
    <!-- Outer Diamond -->
    <path d="M 200 12 L 252 64 L 200 116 L 148 64 Z" fill="#FFFFFF" stroke="url(#red-gradient)" stroke-width="3" stroke-linejoin="round" />
    
    <!-- Inner Diamond Frame -->
    <path d="M 200 19 L 245 64 L 200 109 L 155 64 Z" fill="#FFFFFF" stroke="url(#gold-border)" stroke-width="1.5" stroke-linejoin="round" />

    <!-- RVR Text -->
    <text x="200" y="38" class="badge-text" text-anchor="middle">RVR</text>
    
    <!-- Monogram SD -->
    <text x="198" y="78" class="monogram-text" text-anchor="middle">SD</text>

    <!-- Curved Ribbon at Diamond Bottom -->
    <path d="M 166 94 Q 200 104 234 94" fill="none" stroke="url(#red-gradient)" stroke-width="8" stroke-linecap="round" />
    <path d="M 166 94 Q 200 104 234 94" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
    <text x="200" y="99" class="badge-text" style="font-size: 6px; font-weight: 800; fill: #DC2626;" text-anchor="middle">SINCE 1989</text>

    <!-- 2. ROUNDED CAPSULE BANNER -->
    <!-- Blue Glow Underlay (matches the classic navy blue border) -->
    <rect x="35" y="95" width="330" height="84" rx="42" fill="url(#blue-border)" />
    
    <!-- Main Red Capsule -->
    <rect x="39" y="99" width="322" height="76" rx="38" fill="url(#red-gradient)" stroke="#FFFFFF" stroke-width="1.5" />
    
    <!-- Inner Gold Accent Border -->
    <rect x="44" y="104" width="312" height="66" rx="33" fill="none" stroke="url(#gold-border)" stroke-width="1.5" opacity="0.8" />

    <!-- 3. BRAND NAME TEXTS -->
    <!-- "Sri Durga" -->
    <text x="200" y="142" font-size="34" class="brand-title" text-anchor="middle">Sri Durga</text>
    
    <!-- "SWEETS & BAKERY" -->
    <text x="200" y="159" class="brand-subtitle" text-anchor="middle">SWEETS & BAKERY</text>
  </g>
</svg>
